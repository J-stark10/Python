{% extends 'base.html' %}

{% block content %}

<!-- HEADER -->
<div class="mb-10 text-center">

    <h1 class="text-3xl font-semibold text-white tracking-tight">
        Sistema de Gestión de Equipo
    </h1>

    <p class="text-zinc-400 mt-2 text-sm">
        Administración de miembros y tareas del equipo de trabajo
    </p>

</div>

<!-- GRID PRINCIPAL -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- MIEMBROS -->
    <a href="{{ url_for('miembro.index') }}"
       class="group rounded-xl border border-zinc-800 bg-zinc-900/30 p-6 hover:border-zinc-600 transition">

        <h2 class="text-lg font-medium text-white group-hover:text-zinc-200 transition">
            Miembros
        </h2>

        <p class="text-sm text-zinc-400 mt-2">
            Gestión de integrantes del equipo. Crear, editar y eliminar miembros.
        </p>

    </a>

    <!-- TAREAS -->
    <a href="{{ url_for('tarea.index') }}"
       class="group rounded-xl border border-zinc-800 bg-zinc-900/30 p-6 hover:border-zinc-600 transition">

        <h2 class="text-lg font-medium text-white group-hover:text-zinc-200 transition">
            Tareas
        </h2>

        <p class="text-sm text-zinc-400 mt-2">
            Administración de tareas asignadas y control de estados.
        </p>

    </a>

</div>

{% endblock %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo de Trabajo</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-zinc-950 text-zinc-200 min-h-screen flex flex-col">

    <!-- BARRA SUPERIOR -->
    <header class="border-b border-zinc-800 px-6 py-3 flex items-center justify-between">
        <span class="text-sm font-medium text-zinc-300 tracking-tight">Equipo de Trabajo</span>
        <span class="text-xs text-zinc-600 font-mono">Flask + Tailwind</span>
    </header>

    <!-- CONTENIDO GLOBAL -->
    <main class="flex-1 flex flex-col">

        <div class="flex-1 max-w-5xl mx-auto w-full px-6 py-8">

            <!-- CONTENEDOR PRINCIPAL -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">

                {% block content %}
                {% endblock %}

            </div>

        </div>

        <!-- FOOTER -->
        <footer class="text-center text-xs text-zinc-700 py-4 border-t border-zinc-900">
            Sistema de Equipo de Trabajo • Flask + Tailwind
        </footer>

    </main>

</body>
</html>

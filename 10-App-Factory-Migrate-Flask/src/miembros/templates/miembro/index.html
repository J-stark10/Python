{% extends 'base.html' %}

{% block content %}

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">

    <div>
        <h1 class="text-3xl font-bold">
            Miembros
        </h1>

        <p class="text-zinc-400 text-sm mt-1">
            Gestión de integrantes del equipo
        </p>
    </div>

    <div class="flex gap-3">

        <!-- VOLVER AL CORE -->
        <a href="{{ url_for('core.index') }}"
           class="bg-zinc-700 hover:bg-zinc-600 px-4 py-2 rounded-lg text-sm transition">
            Volver
        </a>

        <!-- AGREGAR -->
        <a href="{{ url_for('miembro.create') }}"
           class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition">
            + Agregar
        </a>

    </div>

</div>

<!-- TABLE -->
<div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">

    <table class="w-full text-sm">

        <thead class="bg-zinc-800 text-zinc-300">
            <tr>
                <th class="text-left px-6 py-4">ID</th>
                <th class="text-left px-6 py-4">Nombre</th>
                <th class="text-left px-6 py-4">Email</th>
                <th class="text-center px-6 py-4">Acciones</th>
            </tr>
        </thead>

        <tbody>

        {% for miembro in miembros %}
        <tr class="border-t border-zinc-800 hover:bg-zinc-800/40 transition">

            <td class="px-6 py-4 text-zinc-400">
                {{ miembro.id }}
            </td>

            <td class="px-6 py-4">
                {{ miembro.nombre }}
            </td>

            <td class="px-6 py-4 text-zinc-400">
                {{ miembro.email }}
            </td>

            <td class="px-6 py-4">
                <div class="flex justify-center gap-2">

                    <a href="{{ url_for('miembro.edit', id=miembro.id) }}"
                       class="bg-amber-600 hover:bg-amber-700 px-3 py-1 rounded text-sm transition">
                        Editar
                    </a>

                    <a href="{{ url_for('miembro.delete', id=miembro.id) }}"
                        onclick="return confirm('¿Estás seguro de eliminar este miembro?');"
                       class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition">
                        Eliminar
                    </a>

                </div>
            </td>

        </tr>
        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}Editar miembro{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">

        <div class="mb-6">
            <h1 class="text-2xl font-bold">
                Editar miembro
            </h1>

            <p class="text-sm text-zinc-400 mt-1">
                Actualiza la información del integrante
            </p>
        </div>

        <form method="POST" class="space-y-5">

            <div>
                <label class="block mb-2 text-zinc-300 text-sm">
                    Nombre
                </label>

                <input
                    type="text"
                    name="nombre"
                    value="{{ miembro.nombre }}"
                    required
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-3 text-sm
                           focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block mb-2 text-zinc-300 text-sm">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    value="{{ miembro.email }}"
                    required
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-3 text-sm
                           focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="flex justify-end gap-3 pt-2">

                <a href="{{ url_for('miembro.index') }}"
                   class="bg-zinc-700 hover:bg-zinc-600 px-5 py-2 rounded-lg text-sm transition">
                    Cancelar
                </a>

                <button
                    type="submit"
                    class="bg-amber-600 hover:bg-amber-700 px-5 py-2 rounded-lg text-sm transition">
                    Actualizar
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}

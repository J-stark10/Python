{% extends 'base.html' %}

{% block title %}Editar Cliente{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">

    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white">Editar Cliente</h1>
        <p class="text-zinc-400 mt-2">Actualiza la información del cliente</p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8">

        <form method="POST" class="space-y-6">

            <div>
                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Nombre
                </label>

                <input type="text"
                       name="name"
                       value="{{ client.name }}"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>

            <div>
                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Email
                </label>

                <input type="email"
                       name="email"
                       value="{{ client.email }}"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>

            <div>
                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Teléfono
                </label>

                <input type="text"
                       name="phone"
                       value="{{ client.phone }}"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>

            <div class="flex justify-end gap-4 pt-4">

                <a href="{{ url_for('client.index') }}"
                   class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl font-medium transition">
                    Cancelar
                </a>

                <button type="submit"
                        class="bg-yellow-500 hover:bg-yellow-600 text-black px-6 py-3 rounded-xl font-medium transition">
                    Actualizar Cliente
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}

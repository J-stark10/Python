{% extends 'base.html' %}

{% block title %}Crear Cliente{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- HEADER -->

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-white">
            Crear Cliente
        </h1>

        <p class="text-zinc-400 mt-2">
            Registra un nuevo cliente en el sistema
        </p>

    </div>

    <!-- CARD -->

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8">

        <form method="POST" action="{{ url_for('client.create') }}" class="space-y-6">

            <!-- NAME -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Nombre
                </label>

                <input
                    type="text"
                    name="name"
                    placeholder="Ingrese el nombre del cliente"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

            </div>

            <!-- EMAIL -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Ingrese el email"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

            </div>

            <!-- PHONE -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Teléfono
                </label>

                <input
                    type="text"
                    name="phone"
                    placeholder="Ingrese el teléfono"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

            </div>

            <!-- BUTTONS -->

            <div class="flex justify-end gap-4 pt-4">

                <a href="{{ url_for('client.index') }}"
                   class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl font-medium transition">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-medium transition"
                >

                    Guardar Cliente

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}

{% extends 'base.html' %}

{% block title %}Crear Producto{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">

    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white">Crear Producto</h1>
        <p class="text-zinc-400 mt-2">Registra un nuevo producto en el sistema</p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8">

        <form method="POST" action="{{ url_for('product.create') }}" class="space-y-6">

            <div>
                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Descripción
                </label>

                <input type="text"
                       name="description"
                       placeholder="Ingrese la descripción del producto"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>

            <div>
                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Precio
                </label>

                <input type="number"
                       step="0.01"
                       name="price"
                       placeholder="0.00"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>

            <div>
                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Stock
                </label>

                <input type="number"
                       name="stock"
                       placeholder="0"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>

            <div class="flex justify-end gap-4 pt-4">

                <a href="{{ url_for('product.index') }}"
                   class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl font-medium transition">
                    Cancelar
                </a>

                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-medium transition">
                    Guardar Producto
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}

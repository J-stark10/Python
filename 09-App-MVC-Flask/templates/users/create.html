{% extends 'base.html' %}

{% block title %}Crear Usuario{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- HEADER -->

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-white">
            Crear Usuario
        </h1>

        <p class="text-zinc-400 mt-2">
            Completa la información del nuevo usuario
        </p>

    </div>

    <!-- CARD -->

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8">

        <form method="POST" action="{{ url_for('user.create') }}" class="space-y-6">

            <!-- NAME -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Nombre
                </label>

                <input
                    type="text"
                    name="name"
                    placeholder="Ingrese el nombre"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

            </div>

            <!-- USERNAME -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Ingrese el username"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

            </div>

            <!-- PASSWORD -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Ingrese la contraseña"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

            </div>

            <!-- ROLE -->

            <div>

                <label class="block mb-2 text-sm font-medium text-zinc-300">
                    Rol
                </label>

                <select
                    name="role"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                >

                    <option value="admin">
                        Admin
                    </option>

                    <option value="employee">
                        Employee
                    </option>

                </select>

            </div>

            <!-- BUTTONS -->

            <div class="flex justify-end gap-4 pt-4">

                <a href="{{ url_for('user.index' )}}"
                   class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl font-medium transition">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-medium transition"
                >

                    Guardar Usuario

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
